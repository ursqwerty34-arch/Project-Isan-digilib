<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 222 821" preserveAspectRatio="xMidYMid meet">
  <!-- Daun atas -->
  <ellipse cx="111" cy="80" rx="60" ry="30" fill="#a5d6a7" fill-opacity="0.7" transform="rotate(-30 111 80)"/>
  <ellipse cx="111" cy="80" rx="60" ry="30" fill="#66bb6a" fill-opacity="0.5" transform="rotate(30 111 80)"/>
  <!-- Batang -->
  <line x1="111" y1="80" x2="111" y2="750" stroke="#2f5d34" stroke-width="4" stroke-linecap="round"/>
  <!-- Daun tengah kiri -->
  <ellipse cx="70" cy="300" rx="55" ry="22" fill="#a5d6a7" fill-opacity="0.8" transform="rotate(-45 70 300)"/>
  <!-- Daun tengah kanan -->
  <ellipse cx="155" cy="450" rx="55" ry="22" fill="#81c784" fill-opacity="0.8" transform="rotate(45 155 450)"/>
  <!-- Daun bawah -->
  <ellipse cx="80" cy="620" rx="50" ry="20" fill="#c8e6c9" fill-opacity="0.9" transform="rotate(-30 80 620)"/>
  <!-- Bunga -->
  <circle cx="111" cy="80" r="18" fill="#ffd54f"/>
  <circle cx="111" cy="80" r="10" fill="#ff8a65"/>
</svg>
